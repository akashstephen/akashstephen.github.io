<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akash Stephen</title>

    <!-- Elegant Typography: Serif for impact, Sans for modern utility -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Deep void background particles -->
    <canvas id="atmosphere"></canvas>

    <!-- Primary interactive physics simulations -->
    <canvas id="physics-engine"></canvas>

    <!-- Scrollable Story Overlay -->
    <main id="story">

        <!-- Act I: The Void (Origin) -->
        <section class="act act-1" id="act-void">
            <div class="content fade">
                <h2 class="serif-title">ambition is raw material.</h2>
            </div>
        </section>

        <!-- Act II: The Tension (Medicine) -->
        <section class="act act-2" id="act-tension">
            <div class="content center-content fade">
                <p class="sans-desc stagger-1">Discipline is the tension that holds it together.</p>
                <h2 class="serif-title stagger-2">Precision. Pulse. Consequence.</h2>
            </div>
        </section>

        <!-- Act III: The Architecture (Systems) -->
        <section class="act act-3" id="act-architecture">
            <div class="content right-content fade">
                <h2 class="serif-title stagger-1">Form follows intent.</h2>
                <p class="sans-desc stagger-2">We build structures to hold the future.</p>
            </div>
        </section>

        <!-- Act IV: The Kintsugi (Refactor) -->
        <section class="act act-4" id="act-kintsugi">
            <div class="content center-content fade">
                <h2 class="serif-title stagger-1">To break is necessary.</h2>
                <h2 class="serif-title gold-accent stagger-2">To rebuild is art.</h2>
            </div>
        </section>

        <!-- Act V: The Resonance (Contact) -->
        <section class="act act-5" id="act-resonance">
            <div class="content center-content final-reveal">
                <h1 class="serif-massive fade">AKASH STEPHEN</h1>

                <div class="contact-links stagger-1">
                    <p class="sans-desc">disturb the water.</p>
                    <div class="intents">
                        <a href="mailto:akashstphn@gmail.com?subject=intent:%20residency">residency</a>
                        <a href="mailto:akashstphn@gmail.com?subject=intent:%20collaboration">collaboration</a>
                        <a href="mailto:akashstphn@gmail.com?subject=intent:%20partnership">partnership</a>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="engine.js"></script>
</body>

</html>
